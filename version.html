<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About MonoBrowser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
    color: #e0e0e0;
    user-select: none;
  }

  .logo {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    margin-bottom: 24px;
    opacity: 0.9;
  }

  h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: #ffffff;
    margin-bottom: 32px;
  }

  .info-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
    min-width: 340px;
    border: 1px solid #2a2a3e;
    border-radius: 10px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.04);
  }

  .info-row {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid #2a2a3e;
    font-size: 14px;
  }

  .info-row:last-child {
    border-bottom: none;
  }

  .info-label {
    width: 120px;
    color: #888;
    font-weight: 500;
    flex-shrink: 0;
  }

  .info-value {
    color: #e0e0e0;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
  }

  .footer {
    margin-top: 48px;
    font-size: 12px;
    color: #555;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <img class="logo" src="{{ICON}}" alt="MonoBrowser logo">
  <h1>MonoBrowser</h1>

  <div class="info-grid">
    <div class="info-row">
      <span class="info-label">Version</span>
      <span class="info-value">{{VERSION}}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Architecture</span>
      <span class="info-value">{{ARCHITECTURE}}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Engine</span>
      <span class="info-value">QtWebEngine / Chromium</span>
    </div>
  </div>

</body>
</html>
