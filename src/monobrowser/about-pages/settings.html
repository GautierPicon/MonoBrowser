<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
    color: #e0e0e0;
    user-select: none;
  }
  h1 {
    font-size: 28px;
    margin: 48px 0 8px;
    color: #fff;
    font-weight: 600;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 32px;
  }
  .option-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 340px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border: 1px solid #2a2a3e;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .option:hover {
    background: rgba(255,255,255,0.08);
    border-color: #4a4a6e;
  }
  .option.selected {
    border-color: #5b8def;
    background: rgba(91,141,239,0.1);
  }
  .option .check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #555;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }
  .option.selected .check {
    border-color: #5b8def;
    background: #5b8def;
    box-shadow: inset 0 0 0 4px #1a1a2e;
  }
  .option .label {
    font-size: 16px;
    font-weight: 500;
  }
  .option .url {
    font-size: 12px;
    color: #777;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <h1>Settings</h1>
  <p class="subtitle">Search engine</p>
  <div class="option-group">
    <a class="option{{#google}}" href="https://monobrowser.internal/set-search?google">
      <span class="check"></span>
      <div>
        <div class="label">Google</div>
        <div class="url">google.com</div>
      </div>
    </a>
    <a class="option{{#duckduckgo}}" href="https://monobrowser.internal/set-search?duckduckgo">
      <span class="check"></span>
      <div>
        <div class="label">DuckDuckGo</div>
        <div class="url">duckduckgo.com</div>
      </div>
    </a>
  </div>
</body>
</html>
